<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Views</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">


</head>
<body>
    <div class="container">
        <header>
            <h1>Assignment Two: One data set four different views</h1>
            <p>Prince George's County Restaurant Inspections.</p>
        </header>

        <nav class="view-selector">
            <button class="view-button" id="btn-categories" data-view="categories">Category View</button>
            <button class="view-button" id="btn-table" data-view="table">Table View</button>
            <button class="view-button" id="btn-stats" data-view="stats">Stats View</button>
            <button class="view-button" id="btn-external" data-view="external">External Library View</button>
        </nav>

        <main class="display-container">
            <div id="data-display">
                <div class="loading">Loading restaurant data...</div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module" src="./script.js"></script>
</body>
</html>
