<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Explore interactive fashion editorials and discover street style through an immersive experience.">
    <title>Fashion Experience - Interactive Lookbook</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Montserrat:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../css/pages/experience/style.css">
    <link rel="stylesheet" href="../../css/pages/experience/motion.css">
  </head>
  <body>
    <main id="page-main">
      <section class="experience" aria-labelledby="experience-title">
        <div class="experience__bg" aria-hidden="true">
          <img
            class="experience__img"
            src=""
            alt=""
            width="1782"
            height="990"
          />
        </div>

        <nav class="experience__hotspots" aria-label="Fashion editorial navigation">
          <ul role="list">
            <li>
              <button
                type="button"
                class="hotspot"
                data-hotspot="1"
                aria-label="View January fashion editorial"
              >
                <span class="hotspot__icon" aria-hidden="true">✦</span>
              </button>
            </li>
            <li>
              <button
                type="button"
                class="hotspot"
                data-hotspot="2"
                aria-label="View February fashion editorial"
              >
                <span class="hotspot__icon" aria-hidden="true">✦</span>
              </button>
            </li>
            <li>
              <button
                type="button"
                class="hotspot"
                data-hotspot="3"
                aria-label="View March fashion editorial"
              >
                <span class="hotspot__icon" aria-hidden="true">✦</span>
              </button>
            </li>
            <li>
              <button
                type="button"
                class="hotspot"
                data-hotspot="4"
                aria-label="View April fashion editorial"
              >
                <span class="hotspot__icon" aria-hidden="true">✦</span>
              </button>
            </li>
          </ul>
        </nav>
      </section>
    </main>

    <aside
      class="modal"
      id="explore-modal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="modal-title"
      aria-describedby="modal-steps"
      hidden
    >
      <div class="modal__gradient" aria-hidden="true"></div>
      <div class="modal__blobs" aria-hidden="true">
        <span class="modal__blob modal__blob--pink"></span>
        <span class="modal__blob modal__blob--yellow"></span>
        <span class="modal__blob modal__blob--stone"></span>
      </div>
      <div class="modal__panel">
        <div class="modal__inner">
          <button type="button" class="modal__close" id="modal-close-btn" aria-label="Close instructions modal">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
              <path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <header class="modal__head-block">
            <div class="modal__icon-badge" aria-hidden="true">
              <img
                class="modal__icon-badge-img"
                src=""
                alt=""
                width="32"
                height="32"
              />
            </div>
            <h2 class="modal__title" id="modal-title">How to Explore</h2>
            <div class="modal__divider" aria-hidden="true"></div>
          </header>
          <ol class="modal__steps" id="modal-steps">
            <li class="modal__step">
              <span class="modal__step-num" aria-hidden="true">1</span>
              <p class="modal__step-text">
                Click on highlighted elements to discover different fashion
                editorials
              </p>
            </li>
            <li class="modal__step">
              <span class="modal__step-num" aria-hidden="true">2</span>
              <p class="modal__step-text">
                Immerse yourself in magazine-style storytelling and visual
                artistry
              </p>
            </li>
          </ol>
          <footer class="modal__footer">
            <div class="modal__tagline" role="status" aria-live="polite">
              <img
                class="modal__tagline-icon"
                src=""
                alt=""
                width="16"
                height="16"
                aria-hidden="true"
              />
              <p class="modal__tagline-text">Interactive Experience</p>
            </div>
            <button type="button" class="modal__submit" id="modal-start-btn">
              Start Exploring
            </button>
          </footer>
        </div>
      </div>
    </aside>

    <script src="../../js/experience.js"></script>
  </body>
</html>
